# Nginx 配置示例：将 aireservation.top 指向 Node 应用
# 复制到服务器：/etc/nginx/sites-enabled/motbot.conf
# 修改后执行：nginx -t && nginx -s reload

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name aireservation.top www.aireservation.top 47.90.218.160;
    return 301 https://aireservation.top$request_uri;
}

# HTTPS 主站（aireservation.top）
server {
    listen 443 ssl;
    server_name aireservation.top 47.90.218.160;

    ssl_certificate /etc/nginx/cert/aireservation.pem;
    ssl_certificate_key /etc/nginx/cert/aireservation.key;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# www 重定向到主域名
server {
    listen 443 ssl;
    server_name www.aireservation.top;
    ssl_certificate /etc/nginx/cert/aireservation.pem;
    ssl_certificate_key /etc/nginx/cert/aireservation.key;
    return 301 https://aireservation.top$request_uri;
}
